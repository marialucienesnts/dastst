<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PGMEI - Manutenção</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="%23f8fff2"/><stop offset="1" stop-color="%23dcefc3"/></linearGradient><linearGradient id="dot" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="%2373bf58"/><stop offset="1" stop-color="%2348953a"/></linearGradient></defs><rect x="4" y="4" width="56" height="56" rx="14" fill="url(%23bg)"/><circle cx="32" cy="32" r="15" fill="url(%23dot)"/><rect x="25" y="25" width="14" height="14" rx="4" fill="%23ffffff"/></svg>'>
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet">
  <link href="/assets/pgmei.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="secondary-site" class="secondary-site active">
    <div class="secondary-stage">
      <div class="secondary-card">
        <div class="secondary-badge">
          <span class="glyphicon glyphicon-wrench"></span> Manutencao programada
        </div>
        <h1 id="secondary-title-label">Estamos em manutencao</h1>
        <p id="secondary-message-label">A equipe da Albuquerque Consultoria MEI DAS esta realizando melhorias para oferecer uma experiencia mais rapida, segura e confiavel. Em breve o atendimento sera retomado.</p>
      </div>

      <div class="construction-scene">
        <div class="crane-hook"></div>
        <div class="cone one"></div>
        <div class="cone two"></div>
        <div class="barrier"></div>
        <div class="worker left">
          <div class="helmet"></div><div class="head"></div><div class="body"></div><div class="arm left"></div><div class="arm right"></div><div class="leg left"></div><div class="leg right"></div>
        </div>
        <div class="truck">
          <div class="truck-cargo"></div><div class="truck-cabin"><div class="truck-window"></div><div class="truck-window small"></div></div><div class="truck-base"></div><div class="wheel one"></div><div class="wheel two"></div><div class="wheel three"></div>
        </div>
        <div class="worker right">
          <div class="helmet"></div><div class="head"></div><div class="body"></div><div class="arm left"></div><div class="arm right"></div><div class="leg left"></div><div class="leg right"></div><div class="tool"></div>
        </div>
        <div class="dust"></div>
        <div class="dust two"></div>
      </div>
    </div>
  </div>

  <script src="/assets/supabase-config.js"></script>
  <script src="/assets/app-common.js"></script>
  <script src="/assets/manutencao.js"></script>
</body>
</html>
