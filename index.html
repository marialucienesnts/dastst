<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PGMEI</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="%23f8fff2"/><stop offset="1" stop-color="%23dcefc3"/></linearGradient><linearGradient id="dot" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="%2373bf58"/><stop offset="1" stop-color="%2348953a"/></linearGradient></defs><rect x="4" y="4" width="56" height="56" rx="14" fill="url(%23bg)"/><circle cx="32" cy="32" r="15" fill="url(%23dot)"/><rect x="25" y="25" width="14" height="14" rx="4" fill="%23ffffff"/></svg>'>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #d6ebb0 0%, #f5f7ef 100%);
      color: #27481f;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .router-card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.96);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(45, 75, 32, 0.16);
      padding: 32px 28px;
      text-align: center;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .brand-mark {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      background: linear-gradient(180deg, #f8fff2 0%, #dcefc3 100%);
      position: relative;
    }
    .brand-mark::before {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: linear-gradient(180deg, #73bf58 0%, #48953a 100%);
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      left: 9px;
      top: 9px;
      width: 6px;
      height: 6px;
      border-radius: 2px;
      background: #fff;
    }
    .loader {
      width: 42px;
      height: 42px;
      margin: 18px auto 0;
      border-radius: 50%;
      border: 4px solid #cfe4b6;
      border-top-color: #4a9a3e;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="router-card">
    <div class="brand"><span class="brand-mark"></span> PGMEI</div>
    <p id="router-status">Preparando acesso...</p>
    <div class="loader" aria-hidden="true"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/supabase-config.js"></script>
  <script src="/assets/app-common.js"></script>
  <script src="/assets/router.js"></script>
</body>
</html>
